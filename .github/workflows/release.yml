# Build a MANIFEST.json from src/ and (on a tag push) cut a GitHub Release.
#
# When you push a tag like `v0.2.1`, this workflow:
#  1. Reads release_config.json for min_compat_version + tier_required.
#  2. Hashes every src/*.py with sha256.
#  3. Writes MANIFEST.json with paths, URLs, hashes, and the config values.
#  4. Creates a GitHub Release using RELEASE_NOTES.md as the body.
#  5. Attaches MANIFEST.json and all src/*.py as release assets.
#
# On a pull request (or push to main), the same build runs WITHOUT cutting
# a release -- the workflow validates that:
#   - python-minifier still accepts every src/*.py,
#   - release_config.json parses,
#   - MANIFEST.json can be assembled,
#   - RELEASE_NOTES.md exists.
# The minified files + manifest are uploaded as workflow artifacts so a
# reviewer can download them from the PR's "Checks" tab. URLs in the PR
# manifest point at a tag that doesn't exist yet -- that's expected; we're
# only verifying the shape, not publishing.
#
# To change min_compat_version or tier_required for a release:
#   edit release_config.json, commit, then push the tag.
#
# To write a release body:
#   edit RELEASE_NOTES.md, commit, then push the tag.
#   The file is overwritten each release -- it always reflects the latest.

name: Build & release firmware

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:
    branches:
      - main

# Top-level permissions are the union of what any job might need.
# The Release step is gated by `if:` below, so PRs (which GitHub already
# downgrades to read-only for forks) never actually exercise `contents: write`.
permissions:
  contents: write

# Group concurrent runs per ref so a rapid sequence of PR pushes cancels
# in-flight builds instead of queuing them. Tag releases keep their own
# group (they should never be cancelled).
concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive_version.outputs.version }}
      is_release: ${{ steps.derive_version.outputs.is_release }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Derive version + release flag
        id: derive_version
        # On a tag push, version is the tag without the leading "v" and we
        # set is_release=true so the Release step downstream fires. On any
        # other event (PR, push to main), we tag the manifest as
        # "dev-<short sha>" so it's obviously not a real release if anyone
        # downloads the artifact.
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            is_release=true
          else
            version="dev-${GITHUB_SHA::7}"
            is_release=false
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"
          echo "Building $version (release=$is_release, event=${GITHUB_EVENT_NAME})"

      - name: Validate required files
        # Catch missing files early on a PR so a tag push doesn't fail
        # halfway through. RELEASE_NOTES.md is the GitHub Release body, so
        # it must exist by tag time -- enforce that on every PR too.
        run: |
          set -euo pipefail
          for f in RELEASE_NOTES.md release_config.json; do
            if [ ! -f "$f" ]; then
              echo "::error::missing required file: $f"
              exit 1
            fi
          done
          # release_config.json must at least parse; the build step pulls
          # min_compat_version + tier_required out with safe defaults so
          # missing keys are tolerated, but malformed JSON is not.
          jq empty release_config.json
          # If a hand-crafted MANIFEST.json is committed, validate that it
          # at least parses too (the manifest step will use it as-is).
          if [ -f MANIFEST.json ]; then
            jq empty MANIFEST.json
          fi

      - name: Minify Python sources for flash
        # The src/*.py files carry heavy educational comments + docstrings
        # (intentional -- they're the project's onboarding material). On
        # the Pico that prose is dead weight: every byte sits in flash and
        # gets parsed on import. We strip it here so the release assets
        # the Pico downloads via OTA are as small as possible, while the
        # repo source stays human-readable.
        #
        # python-minifier flags:
        #   --remove-literal-statements: drops module/class/function docstrings
        #   (default) renames local variables, removes comments, packs whitespace
        #   (default) does NOT rename globals -- cross-module imports rely on them
        run: |
          set -euo pipefail
          pip install --quiet python-minifier
          mkdir -p dist
          total_src=0
          total_dist=0
          for f in src/*.py; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            python -m python_minifier --remove-literal-statements "$f" > "dist/$base"
            src_sz=$(wc -c < "$f")
            dist_sz=$(wc -c < "dist/$base")
            total_src=$((total_src + src_sz))
            total_dist=$((total_dist + dist_sz))
            pct=$(( 100 * dist_sz / src_sz ))
            printf "  %-25s %7d -> %7d bytes (%3d%%)\n" \
              "$base" "$src_sz" "$dist_sz" "$pct"
          done
          if [ "$total_src" -gt 0 ]; then
            total_pct=$(( 100 * total_dist / total_src ))
          else
            total_pct=0
          fi
          printf "  %-25s %7d -> %7d bytes (%3d%%)\n" \
            "TOTAL" "$total_src" "$total_dist" "$total_pct"

      - name: Build MANIFEST.json
        # On a tag push, ${tag} resolves to the actual ref and the URLs
        # baked into the manifest will resolve once the release is created
        # below. On a PR or branch push, ${tag} is "v<dev-version>" which
        # won't exist as a release; that's fine because we don't ship the
        # PR manifest anywhere -- it's only an artifact for inspection.
        run: |
          set -euo pipefail
          version="${{ steps.derive_version.outputs.version }}"
          is_release="${{ steps.derive_version.outputs.is_release }}"
          if [ "$is_release" = "true" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v${version}"
          fi
          repo="${GITHUB_REPOSITORY}"
          base_url="https://github.com/${repo}/releases/download/${tag}"

          if [ -f MANIFEST.json ]; then
            # Manual MANIFEST.json committed to the repo -- use it as-is.
            # Useful when you need post-install hooks, a custom file list,
            # or a breaking-change migration that the auto-generator can't
            # express. The file is attached to the release unchanged.
            echo "Using committed MANIFEST.json (manual override)"
          else
            # Auto-generate from dist/*.py (minified flash payload).
            # Read release metadata from release_config.json.
            # min_compat_version: bump when a release requires a migration
            #   or ABI change that older firmware can't safely skip.
            # tier_required: set to "supporter" to gate a beta to paying users.
            min_compat=$(jq -r '.min_compat_version // "0.0.0"' release_config.json 2>/dev/null || echo "0.0.0")
            tier=$(jq -r '.tier_required // "free"' release_config.json 2>/dev/null || echo "free")

            # Hash the MINIFIED files: that's what the Pico downloads and
            # verifies, so the manifest checksum must match the on-wire bytes.
            files=$(
              cd dist
              for f in *.py; do
                [ -f "$f" ] || continue
                hash=$(sha256sum "$f" | cut -d' ' -f1)
                printf '{"path":"%s","url":"%s/%s","sha256":"%s"}\n' \
                  "$f" "$base_url" "$f" "$hash"
              done | jq -s .
            )

            jq -n \
              --arg version "$version" \
              --arg min_compat "$min_compat" \
              --arg tier "$tier" \
              --argjson files "$files" \
              '{
                 version: $version,
                 min_compat_version: $min_compat,
                 tier_required: $tier,
                 files: $files
               }' > MANIFEST.json
          fi

          # Print the manifest into the job log so PR reviewers can sanity-
          # check it without downloading the artifact.
          echo "::group::MANIFEST.json"
          cat MANIFEST.json
          echo "::endgroup::"

      - name: Upload build artifacts (for PR / branch builds)
        # Skip the upload on a tag push -- the Release step below already
        # attaches the same files to the release, no need to keep two copies.
        if: steps.derive_version.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.derive_version.outputs.version }}
          path: |
            MANIFEST.json
            dist/*.py
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        # Only on a tag push -- a PR (especially from a fork) doesn't have
        # write access to contents anyway, but the explicit gate makes the
        # intent unmistakable and prevents accidental releases from a main
        # branch push that happens to include "v1.2.3" in a commit message.
        if: steps.derive_version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.derive_version.outputs.version }}
          body_path: RELEASE_NOTES.md
          # Upload the minified files (flat filenames -- Pico expects
          # main.py, not dist/main.py, when it fetches release assets).
          files: |
            MANIFEST.json
            dist/*.py
