# Cut a GitHub Release every time main advances to a version that doesn't
# yet have a tag.
#
# The version comes from the FIRST heading of RELEASE_NOTES.md, which must
# look like:
#
#     ## v0.3.6 — Fix handling of redirects by `ws_client.py`
#
# All input validation (RELEASE_NOTES heading parses, FIRMWARE_VERSION in
# src/main.py matches, src/*.py compiles, etc.) lives in the separate CI
# workflow (.github/workflows/ci.yml) and is required to pass on the PR
# before merge. By the time we get here those invariants already hold, so
# this workflow only does release work:
#
#   1. Triggers on push to main (PR-merge or direct push) + workflow_dispatch.
#   2. Parses "v<X.Y.Z>" from the first heading of RELEASE_NOTES.md.
#   3. If a tag for that version already exists, exits cleanly (idempotent
#      re-runs of the same merge do nothing).
#   4. Minifies src/*.py into dist/*.py.
#   5. Builds MANIFEST.json from release_config.json + the minified files.
#   6. Calls softprops/action-gh-release, which atomically creates the
#      v<version> tag (pointing at this merge commit) AND the GitHub
#      Release (with RELEASE_NOTES.md as the body, MANIFEST.json + dist/*.py
#      as assets).
#
# To bump the version:
#   In your PR, change the first heading of RELEASE_NOTES.md to the new
#   version AND update FIRMWARE_VERSION in src/main.py to the same value.
#   CI will fail the PR if those two drift apart, so you can't forget.

name: Release firmware

on:
  push:
    branches:
      - main
  # Manual override -- useful if you need to re-cut a release after fixing
  # a typo in RELEASE_NOTES.md without producing a new merge commit.
  workflow_dispatch:

permissions:
  # contents: write so action-gh-release can create the tag + release.
  contents: write

# Don't allow two release workflow runs on the same ref to race -- the
# second one would either fail (duplicate tag) or, worse, overwrite assets
# mid-upload.
concurrency:
  group: firmware-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          # Need the full tag list to detect already-released versions in
          # the skip step below. Default fetch-depth=1 doesn't fetch tags.
          fetch-depth: 0

      - name: Parse version from RELEASE_NOTES.md
        id: version
        run: |
          set -euo pipefail
          version=$(
            grep -m1 -oE '^##[[:space:]]+v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?' RELEASE_NOTES.md \
              | sed -E 's/^##[[:space:]]+v//'
          ) || true
          if [ -z "${version:-}" ]; then
            # CI should have caught this, but defend in depth in case the
            # release workflow runs without CI (workflow_dispatch on a
            # branch that skipped review).
            echo "::error file=RELEASE_NOTES.md::could not parse '## v<X.Y.Z>' from the first heading"
            head -n 5 RELEASE_NOTES.md
            exit 1
          fi
          echo "Releasing version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version"   >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: tag_check
        # Idempotent re-run guard. If the version in RELEASE_NOTES.md
        # already has a tag (e.g. someone re-ran this workflow without
        # bumping), we exit success without doing anything else. The next
        # bump triggers a fresh release.
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists -- nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${tag} does not exist; will release."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.tag_check.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Minify Python sources for flash
        if: steps.tag_check.outputs.skip != 'true'
        # The src/*.py files carry heavy educational comments + docstrings
        # (intentional -- they're the project's onboarding material). On
        # the Pico that prose is dead weight: every byte sits in flash and
        # gets parsed on import. We strip it here so the release assets
        # the Pico downloads via OTA are as small as possible, while the
        # repo source stays human-readable.
        run: |
          set -euo pipefail
          pip install --quiet python-minifier
          mkdir -p dist
          total_src=0
          total_dist=0
          for f in src/*.py; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            python -m python_minifier --remove-literal-statements "$f" > "dist/$base"
            src_sz=$(wc -c < "$f")
            dist_sz=$(wc -c < "dist/$base")
            total_src=$((total_src + src_sz))
            total_dist=$((total_dist + dist_sz))
            pct=$(( 100 * dist_sz / src_sz ))
            printf "  %-25s %7d -> %7d bytes (%3d%%)\n" \
              "$base" "$src_sz" "$dist_sz" "$pct"
          done
          if [ "$total_src" -gt 0 ]; then
            total_pct=$(( 100 * total_dist / total_src ))
          else
            total_pct=0
          fi
          printf "  %-25s %7d -> %7d bytes (%3d%%)\n" \
            "TOTAL" "$total_src" "$total_dist" "$total_pct"

      - name: Build MANIFEST.json
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"
          repo="${GITHUB_REPOSITORY}"
          base_url="https://github.com/${repo}/releases/download/${tag}"

          if [ -f MANIFEST.json ]; then
            # Manual MANIFEST.json committed to the repo -- use it as-is.
            # Useful when you need post-install hooks, a custom file list,
            # or a breaking-change migration that the auto-generator can't
            # express. The file is attached to the release unchanged.
            echo "Using committed MANIFEST.json (manual override)"
          else
            min_compat=$(jq -r '.min_compat_version // "0.0.0"' release_config.json)
            tier=$(jq -r '.tier_required // "free"' release_config.json)

            files=$(
              cd dist
              for f in *.py; do
                [ -f "$f" ] || continue
                hash=$(sha256sum "$f" | cut -d' ' -f1)
                printf '{"path":"%s","url":"%s/%s","sha256":"%s"}\n' \
                  "$f" "$base_url" "$f" "$hash"
              done | jq -s .
            )

            jq -n \
              --arg version "$version" \
              --arg min_compat "$min_compat" \
              --arg tier "$tier" \
              --argjson files "$files" \
              '{
                 version: $version,
                 min_compat_version: $min_compat,
                 tier_required: $tier,
                 files: $files
               }' > MANIFEST.json
          fi

          echo "::group::MANIFEST.json"
          cat MANIFEST.json
          echo "::endgroup::"

      - name: Create tag and GitHub Release
        # softprops/action-gh-release creates the tag (pointed at the
        # current commit) AND the release in one atomic operation. If
        # we'd done `git tag && git push` ourselves, a failure between
        # the two would leave the repo in a half-released state.
        if: steps.tag_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            MANIFEST.json
            dist/*.py
          fail_on_unmatched_files: true
